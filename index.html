<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Мой облачный проект</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: #0a0a0a;
      font-family: 'Georgia', serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    /* ── Тосты ── */
    #toast-container { position: fixed; top: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
    .toast {
      background: #1a1a1a; border-left: 3px solid #b8860b;
      color: #e0e0e0; padding: 14px 20px; font-size: 13px;
      min-width: 260px; box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      animation: slideIn 0.3s ease, fadeOut 0.4s ease 2.6s forwards;
      line-height: 1.5;
    }
    .toast.success { border-left-color: #2e7d32; }
    .toast.error   { border-left-color: #8b0000; }
    .toast-title   { font-weight: bold; color: #f0c040; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 3px; }
    @keyframes slideIn { from { opacity:0; transform:translateX(30px); } to { opacity:1; transform:translateX(0); } }
    @keyframes fadeOut { from { opacity:1; } to { opacity:0; transform:translateY(-6px); } }

    /* ── Блок авторизации ── */
    #authSection {
      width: 100%; max-width: 480px;
      background: #0f0f0f; border: 1px solid #2a2000;
      padding: 18px 24px; margin-bottom: 24px;
      display: flex; align-items: center; justify-content: space-between; gap: 14px;
      flex-wrap: wrap;
    }

    #loginBtn {
      display: flex; align-items: center; gap: 10px;
      background: #1a1a1a; border: 1px solid #b8860b; color: #f0c040;
      padding: 10px 20px; font-size: 12px; letter-spacing: 1.5px; text-transform: uppercase;
      cursor: pointer; transition: all 0.3s; font-family: 'Georgia', serif;
      white-space: nowrap; width: 100%; justify-content: center;
    }
    #loginBtn:hover { background: #1f1a0f; }

    #userInfo {
      display: none;
      align-items: center; gap: 12px; flex-wrap: wrap; width: 100%;
    }
    #userPhoto {
      width: 38px; height: 38px; border-radius: 50%;
      border: 2px solid #b8860b; object-fit: cover;
    }
    #userName  { color: #f0c040; font-size: 14px; font-weight: bold; }
    #userEmail { color: #666; font-size: 11px; }

    #logoutBtn {
      background: transparent; border: 1px solid #2a1a1a; color: #555;
      padding: 8px 16px; font-size: 11px; letter-spacing: 1px; text-transform: uppercase;
      cursor: pointer; transition: all 0.2s; font-family: 'Georgia', serif;
      white-space: nowrap; margin-left: auto; width: auto;
    }
    #logoutBtn:hover { border-color: #8b0000; color: #cc3333; background: #1a0f0f; }

    /* ── Форма ── */
    .card {
      background: #111; border: 1px solid #8a6a00; padding: 45px;
      width: 100%; max-width: 480px;
      box-shadow: 0 0 40px rgba(180,130,0,0.15); margin-bottom: 30px;
    }
    .label-top { color: #b8860b; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 16px; }
    .label-top::before { content: '— '; }
    h1 { color: #f0c040; font-size: 28px; font-weight: bold; margin-bottom: 8px; }
    .subtitle { color: #666; font-size: 13px; margin-bottom: 30px; line-height: 1.6; }
    .field { margin-bottom: 20px; }
    .field-label { color: #888; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px; }
    input {
      width: 100%; background: #1a1a1a; border: 1px solid #333; color: #eee;
      padding: 14px 16px; font-size: 14px; outline: none;
      transition: border 0.3s; font-family: 'Georgia', serif;
    }
    input::placeholder { color: #444; }
    input:focus { border-color: #b8860b; }
    input[readonly] { opacity: 0.6; cursor: default; }
    .submit-btn {
      width: 100%; padding: 16px; background: #b8860b; color: #000;
      font-size: 11px; font-weight: bold; letter-spacing: 3px; text-transform: uppercase;
      border: none; cursor: pointer; transition: background 0.3s; font-family: 'Georgia', serif;
    }
    .submit-btn:hover { background: #d4a017; }
    .submit-btn:disabled { background: #555; color: #888; cursor: not-allowed; }
    .footer-note { text-align: center; color: #444; font-size: 11px; margin-top: 16px; }
    .footer-note span { color: #b8860b; }

    /* Заглушка для гостей */
    #guestNotice {
      display: none;
      width: 100%; max-width: 480px;
      background: #111; border: 1px solid #2a2000;
      padding: 36px; text-align: center; margin-bottom: 30px;
    }
    #guestNotice p { color: #555; font-size: 13px; line-height: 1.8; }
    #guestNotice b { color: #b8860b; }

    /* ── Админ-панель ── */
    .admin-bar {
      width: 100%; max-width: 480px;
      background: #0f0f0f; border: 1px solid #2a2000;
      padding: 16px 20px; margin-bottom: 20px;
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
      flex-wrap: wrap;
    }
    .admin-label { color: #b8860b; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; }
    .admin-stats { color: #555; font-size: 12px; }
    .admin-stats b { color: #f0c040; }
    .admin-toggle {
      background: #1a1a1a; border: 1px solid #333; color: #888;
      padding: 7px 16px; font-size: 11px; letter-spacing: 1px;
      cursor: pointer; transition: all 0.2s; font-family: 'Georgia', serif;
    }
    .admin-toggle.on { border-color: #b8860b; color: #f0c040; background: #1f1a0f; }
    .admin-toggle:hover { border-color: #b8860b; color: #f0c040; }

    /* ── Фильтр ── */
    .filter-bar {
      width: 100%; max-width: 480px;
      display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap;
    }
    .filter-btn {
      background: #111; border: 1px solid #222; color: #555;
      padding: 7px 16px; font-size: 11px; letter-spacing: 1px;
      cursor: pointer; border-radius: 4px; transition: all 0.2s; font-family: 'Georgia', serif;
    }
    .filter-btn:hover { border-color: #8a6a00; color: #b8860b; }
    .filter-btn.active { border-color: #b8860b; color: #f0c040; background: #1f1a0f; }

    /* ── Лента ── */
    .feed-title {
      color: #b8860b; font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
      width: 100%; max-width: 480px; margin-bottom: 16px;
    }
    .feed-title::before { content: '— '; }

    .post {
      background: #111; border: 1px solid #222; padding: 20px 24px;
      width: 100%; max-width: 480px; margin-bottom: 12px; transition: border 0.3s;
    }
    .post:hover { border-color: #8a6a00; }
    .post-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
    .post-name   { color: #f0c040; font-size: 16px; font-weight: bold; }
    .post-time   { color: #444; font-size: 11px; }
    .post-email  { color: #666; font-size: 13px; margin-bottom: 12px; }

    .status-badge {
      display: inline-block; padding: 3px 10px; border-radius: 20px;
      font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
      font-weight: bold; margin-bottom: 14px;
    }
    .s-new      { background: #1a1a2e; color: #6c8ebf; border: 1px solid #2a2a4a; }
    .s-progress { background: #1f1a0f; color: #d4a017; border: 1px solid #3a2e00; }
    .s-done     { background: #0f1f0f; color: #4caf50; border: 1px solid #1a3a1a; }

    .status-controls { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
    .status-btn {
      background: #1a1a1a; border: 1px solid #2a2a2a; color: #555;
      padding: 6px 13px; font-size: 11px; letter-spacing: 1px;
      cursor: pointer; border-radius: 4px; transition: all 0.2s; font-family: 'Georgia', serif;
    }
    .status-btn:hover  { border-color: #b8860b; color: #f0c040; background: #1f1a0f; }
    .status-btn.active { border-color: #b8860b; color: #f0c040; background: #1f1a0f; }

    .post-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .like-btn {
      background: #1a1a1a; border: 1px solid #333; color: #888;
      padding: 7px 16px; font-size: 13px; cursor: pointer;
      border-radius: 20px; transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px;
    }
    .like-btn:hover { border-color: #b8860b; color: #f0c040; background: #1f1a0f; }

    .delete-btn {
      display: none;
      background: transparent; border: 1px solid #2a1a1a; color: #555;
      padding: 7px 14px; font-size: 11px; letter-spacing: 1px;
      cursor: pointer; border-radius: 20px; transition: all 0.2s; font-family: 'Georgia', serif;
    }
    .delete-btn:hover { border-color: #8b0000; color: #cc3333; background: #1a0f0f; }
    body.admin-mode .delete-btn { display: inline-flex; }
    body.admin-mode .status-controls { display: flex; }
    body:not(.admin-mode) .status-controls { display: none; }

    .empty { color: #444; font-size: 13px; text-align: center; padding: 30px; }
  </style>
</head>
<body>

<div id="toast-container"></div>

<!-- ═══ АВТОРИЗАЦИЯ ═══ -->
<div id="authSection">
  <!-- Кнопка входа (для гостей) -->
  <button id="loginBtn">
    <svg width="18" height="18" viewBox="0 0 48 48">
      <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
      <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
      <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
      <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.29-8.16 2.29-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
    </svg>
    Войти через Google
  </button>

  <!-- Инфо о пользователе (после входа) -->
  <div id="userInfo">
    <img id="userPhoto" src="" alt="Avatar">
    <div>
      <div id="userName"></div>
      <div id="userEmail"></div>
    </div>
    <button id="logoutBtn">Выйти</button>
  </div>
</div>

<!-- ═══ ФОРМА (только для авторизованных) ═══ -->
<div id="messageForm" class="card" style="display:none;">
  <div class="label-top">Новая заявка</div>
  <h1>Отправить заявку</h1>
  <p class="subtitle">Данные из вашего Google-аккаунта сохраняются в облаке.</p>
  <div class="field">
    <div class="field-label">Ваше имя</div>
    <input type="text" id="name" readonly>
  </div>
  <div class="field">
    <div class="field-label">Email-адрес</div>
    <input type="email" id="email" readonly>
  </div>
  <div class="field">
    <div class="field-label">Сообщение</div>
    <input type="text" id="content" placeholder="Что у вас нового?">
  </div>
  <button class="submit-btn" id="mainBtn">→ Опубликовать в облако</button>
  <div class="footer-note">Данные сохраняются в <span>Firebase Firestore</span></div>
</div>

<!-- Заглушка для гостей -->
<div id="guestNotice">
  <p>Чтобы отправить заявку — <b>войдите через Google</b></p>
</div>

<!-- ═══ АДМИН-ПАНЕЛЬ ═══ -->
<div class="admin-bar">
  <div>
    <div class="admin-label">Панель управления</div>
    <div class="admin-stats">Всего заявок: <b id="totalCount">0</b></div>
  </div>
  <button class="admin-toggle" id="adminToggle" onclick="toggleAdmin()">⚙ Режим админа</button>
</div>

<!-- Фильтр -->
<div class="filter-bar">
  <button class="filter-btn active" onclick="setFilter('all', this)">Все</button>
  <button class="filter-btn" onclick="setFilter('new', this)">● Новые</button>
  <button class="filter-btn" onclick="setFilter('progress', this)">◐ В работе</button>
  <button class="filter-btn" onclick="setFilter('done', this)">✓ Выполненные</button>
</div>

<div class="feed-title">Лента заявок</div>
<div id="feed" style="width:100%;max-width:480px;">
  <div class="empty">Загрузка...</div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
  import {
    getFirestore, collection, addDoc, deleteDoc,
    query, orderBy, onSnapshot,
    serverTimestamp, updateDoc, doc, increment
  } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
  import {
    getAuth, signInWithPopup, GoogleAuthProvider,
    signOut, onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCVz4TxqdDSSCn7Ztdt_c0rH9fuG3rYRIQ",
    authDomain: "project-1377923308705650525.firebaseapp.com",
    projectId: "project-1377923308705650525",
    storageBucket: "project-1377923308705650525.firebasestorage.app",
    messagingSenderId: "816182554603",
    appId: "1:816182554603:web:624159d3c9c89a046c73ae"
  };

  const app      = initializeApp(firebaseConfig);
  const db       = getFirestore(app);
  const auth     = getAuth(app);
  const provider = new GoogleAuthProvider();

  // ── Тост ─────────────────────────────────────────────────────────
  function showNotification(title, message, type = 'default') {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.innerHTML = `<div class="toast-title">${title}</div>${message}`;
    container.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
  }

  // ── Авторизация ───────────────────────────────────────────────────
  const loginBtn    = document.getElementById('loginBtn');
  const logoutBtn   = document.getElementById('logoutBtn');
  const userInfo    = document.getElementById('userInfo');
  const messageForm = document.getElementById('messageForm');
  const guestNotice = document.getElementById('guestNotice');

  loginBtn.onclick  = () => signInWithPopup(auth, provider);
  logoutBtn.onclick = () => signOut(auth);

  onAuthStateChanged(auth, (user) => {
    if (user) {
      // Вошёл — показываем форму
      loginBtn.style.display    = 'none';
      userInfo.style.display    = 'flex';
      messageForm.style.display = 'block';
      guestNotice.style.display = 'none';

      document.getElementById('userPhoto').src         = user.photoURL || '';
      document.getElementById('userName').textContent  = user.displayName;
      document.getElementById('userEmail').textContent = user.email;
      document.getElementById('name').value            = user.displayName;
      document.getElementById('email').value           = user.email;

      showNotification('Добро пожаловать', `Вы вошли как <b>${user.displayName}</b>`, 'success');
    } else {
      // Гость — скрываем форму
      loginBtn.style.display    = 'flex';
      userInfo.style.display    = 'none';
      messageForm.style.display = 'none';
      guestNotice.style.display = 'block';
    }
  });

  // ── Удалить ───────────────────────────────────────────────────────
  window.deleteRequest = async (id, name) => {
    if (!confirm(`Удалить заявку от "${name}"?`)) return;
    try {
      await deleteDoc(doc(db, "requests", id));
      showNotification('Удалено', `Заявка от <b>${name}</b> удалена`, 'error');
    } catch (e) {
      showNotification('Ошибка', 'Не удалось удалить', 'error');
    }
  };

  // ── Статус ────────────────────────────────────────────────────────
  window.changeStatus = async (id, newStatus, name) => {
    const labels = { new: 'Новая', progress: 'В работе', done: 'Выполнена' };
    try {
      await updateDoc(doc(db, "requests", id), { status: newStatus });
      showNotification('Статус изменён', `${name} → <b>${labels[newStatus]}</b>`,
        newStatus === 'done' ? 'success' : 'default');
    } catch (e) {
      showNotification('Ошибка', 'Не удалось изменить статус', 'error');
    }
  };

  // ── Лайк ──────────────────────────────────────────────────────────
  window.processLike = async (id) => {
    if (!auth.currentUser) {
      showNotification('Ошибка', 'Войдите, чтобы поставить лайк', 'error');
      return;
    }
    try {
      await updateDoc(doc(db, "requests", id), { likes: increment(1) });
    } catch (e) {
      showNotification('Ошибка', 'Доступ заблокирован (Rules)', 'error');
    }
  };

  // ── Режим админа ──────────────────────────────────────────────────
  window.toggleAdmin = () => {
    const isAdmin = document.body.classList.toggle('admin-mode');
    const btn = document.getElementById('adminToggle');
    btn.classList.toggle('on', isAdmin);
    btn.textContent = isAdmin ? '✓ Режим админа ВКЛ' : '⚙ Режим админа';
    showNotification(
      isAdmin ? 'Админ включён' : 'Админ выключен',
      isAdmin ? 'Можно удалять и менять статусы' : 'Управление скрыто',
      isAdmin ? 'success' : 'default'
    );
  };

  // ── Фильтр ────────────────────────────────────────────────────────
  let currentFilter = 'all';
  let allPosts = [];

  window.setFilter = (filter, btn) => {
    currentFilter = filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderFeed();
  };

  // ── Отрисовка ─────────────────────────────────────────────────────
  const sClass = { new: 's-new', progress: 's-progress', done: 's-done' };
  const sLabel = { new: '● Новая', progress: '◐ В работе', done: '✓ Выполнена' };

  function renderFeed() {
    const feed = document.getElementById('feed');
    const posts = currentFilter === 'all'
      ? allPosts
      : allPosts.filter(p => (p.status || 'new') === currentFilter);

    document.getElementById('totalCount').textContent = allPosts.length;

    if (posts.length === 0) {
      feed.innerHTML = '<div class="empty">Заявок нет</div>';
      return;
    }

    feed.innerHTML = "";
    posts.forEach(({ id, name, email, text, likes, time, status }) => {
      const st = status || 'new';
      feed.innerHTML += `
        <div class="post">
          <div class="post-header">
            <div class="post-name">${name}</div>
            <div class="post-time">${time}</div>
          </div>
          <div class="post-email">${email}</div>
          ${text ? `<p style="color:#bbb;font-size:14px;margin-bottom:14px;">${text}</p>` : ''}
          <span class="status-badge ${sClass[st]}">${sLabel[st]}</span>
          <div class="status-controls">
            <button class="status-btn ${st==='new'?'active':''}" onclick="changeStatus('${id}','new','${name}')">Новая</button>
            <button class="status-btn ${st==='progress'?'active':''}" onclick="changeStatus('${id}','progress','${name}')">В работе</button>
            <button class="status-btn ${st==='done'?'active':''}" onclick="changeStatus('${id}','done','${name}')">Выполнена</button>
          </div>
          <div class="post-actions">
            <button class="like-btn" onclick="processLike('${id}')">👍 ${likes || 0}</button>
            <button class="delete-btn" onclick="deleteRequest('${id}','${name}')">✕ Удалить</button>
          </div>
        </div>`;
    });
  }

  // ── Отправить ─────────────────────────────────────────────────────
  document.getElementById('mainBtn').onclick = async () => {
    const user = auth.currentUser;
    if (!user) { showNotification('Ошибка', 'Вы не авторизованы', 'error'); return; }

    const btn     = document.getElementById('mainBtn');
    const content = document.getElementById('content').value.trim();
    if (!content) { showNotification('Ошибка', 'Введите текст сообщения!', 'error'); return; }

    btn.disabled = true;
    try {
      await addDoc(collection(db, "requests"), {
        name:      user.displayName,
        email:     user.email,
        photo:     user.photoURL,
        text:      content,
        likes:     0,
        status:    'new',
        timestamp: serverTimestamp()
      });
      document.getElementById('content').value = "";
      showNotification('Готово', `Заявка от <b>${user.displayName}</b> отправлена`, 'success');
    } catch (e) {
      showNotification('Ошибка безопасности', 'Проверьте правила (Rules) в Firebase', 'error');
    }
    btn.disabled = false;
  };

  // ── Realtime лента ────────────────────────────────────────────────
  const q = query(collection(db, "requests"), orderBy("timestamp", "desc"));
  onSnapshot(q, (snapshot) => {
    allPosts = snapshot.docs.map(d => {
      const data = d.data();
      return {
        id:     d.id,
        name:   data.name,
        email:  data.email,
        text:   data.text || '',
        likes:  data.likes,
        status: data.status || 'new',
        time:   data.timestamp?.toDate().toLocaleTimeString('ru-RU', { hour:'2-digit', minute:'2-digit' }) || '...'
      };
    });
    renderFeed();
  });

  // Для тестов в консоли F12
  window.db = db;
</script>
</body>
</html>
