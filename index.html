<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Заявки</title>
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/topbar.css">
<link rel="stylesheet" href="css/sidebar-left.css">
<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="css/sidebar-right.css">
<link rel="stylesheet" href="css/chat.css">
<link rel="stylesheet" href="css/toast.css">
</head>
<body>

<div id="toasts"></div>

<div class="app">

  <!-- ══════════════════ TOPBAR ══════════════════ -->
  <header class="topbar">
    <div class="logo">
      <div class="logo-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2">
          <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/>
          <rect x="9" y="3" width="6" height="4" rx="1"/>
          <path d="M9 12h6M9 16h4"/>
        </svg>
      </div>
      <span class="logo-txt">Заявки</span>
    </div>
    <div class="tb-div"></div>
    <div class="tb-search">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
      </svg>
      <input type="text" id="searchInput" placeholder="Поиск по имени, email, тексту…">
    </div>
    <div class="topbar-right">
      <button class="tb-btn" id="adminPill" onclick="toggleAdmin()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/>
        </svg>
        Панель управления
      </button>
      <div id="userPill" class="user-pill">
        <div class="u-av" id="uAvBox"><img id="pillPhoto" src="" alt=""></div>
        <span id="pillName" class="u-name"></span>
        <button class="u-logout" id="logoutX" title="Выйти">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/>
          </svg>
        </button>
      </div>
      <button class="tb-btn login-btn" id="loginTopBtn">
        <svg width="13" height="13" viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.29-8.16 2.29-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        Войти через Google
      </button>
    </div>
  </header>

  <!-- ══════════════════ LEFT SIDEBAR ══════════════════ -->
  <nav class="sidebar-l">
    <div class="sl-inner">
      <div class="sl-lbl">Разделы</div>
      <button class="nav-btn active" onclick="setView('feed',this)">
        <span class="n-ic">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/>
            <rect x="9" y="3" width="6" height="4" rx="1"/>
            <path d="M9 12h6M9 16h4"/>
          </svg>
        </span>
        <span class="n-label">Лента заявок</span>
        <span class="n-cnt" id="nc-all">0</span>
      </button>
      <button class="nav-btn" onclick="setView('chats',this)">
        <span class="n-ic">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
          </svg>
        </span>
        <span class="n-label">Сообщения</span>
        <span class="n-cnt" id="st-chats">0</span>
      </button>
      <div class="sl-div"></div>
      <div class="sl-lbl">Фильтр</div>
      <button class="nav-btn" onclick="setFilter('new',this)" id="fn-new">
        <span class="n-ic">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
        </span>
        <span class="n-label">Новые</span>
        <span class="n-cnt blue" id="nc-new">0</span>
      </button>
      <button class="nav-btn" onclick="setFilter('progress',this)" id="fn-prog">
        <span class="n-ic">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
        </span>
        <span class="n-label">В работе</span>
        <span class="n-cnt amber" id="nc-prog">0</span>
      </button>
      <button class="nav-btn" onclick="setFilter('done',this)" id="fn-done">
        <span class="n-ic">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </span>
        <span class="n-label">Выполненные</span>
        <span class="n-cnt green" id="nc-done">0</span>
      </button>
    </div>
    <div class="sl-stats">
      <div class="sl-stats-title">Статистика</div>
      <div class="sl-st">
        <span class="sl-st-l">Всего заявок</span>
        <span class="sl-st-v" id="st-total">0</span>
      </div>
      <div class="sl-st">
        <span class="sl-st-l">Выполнено</span>
        <span class="sl-st-v" id="st-done">0</span>
      </div>
    </div>
  </nav>

  <!-- ══════════════════ MAIN ══════════════════ -->
  <main class="main">
    <div class="main-head">
      <div class="main-title" id="pageTitle">Лента заявок</div>
    </div>
    <div class="chips-bar" id="mainChips">
      <button class="chip active" onclick="setFilterChip('all',this)">Все</button>
      <button class="chip" onclick="setFilterChip('new',this)">Новые</button>
      <button class="chip" onclick="setFilterChip('progress',this)">В работе</button>
      <button class="chip" onclick="setFilterChip('done',this)">Выполненные</button>
    </div>
    <div class="feed" id="feedView">
      <div class="empty-s">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity=".3">
          <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/>
          <rect x="9" y="3" width="6" height="4" rx="1"/>
          <path d="M9 12h6M9 16h4"/>
        </svg>
        <span>Загрузка…</span>
      </div>
    </div>
  </main>

  <!-- ══════════════════ RIGHT SIDEBAR ══════════════════ -->
  <aside class="sidebar-r">
    <div class="sr-tabs">
      <div class="sr-tab active" id="tab-req" onclick="switchTab('req')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:inline;vertical-align:middle;margin-right:5px">
          <path d="M12 5v14M5 12h14"/>
        </svg>
        Новая заявка
      </div>
      <div class="sr-tab" id="tab-chat" onclick="switchTab('chat')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:inline;vertical-align:middle;margin-right:5px">
          <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
        </svg>
        Чаты
      </div>
    </div>

    <!-- FORM PANEL -->
    <div id="panel-req" style="flex:1;display:flex;flex-direction:column;overflow:hidden">
      <div id="guestBox" class="guest-box">
        <div class="guest-icon">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0110 0v4"/>
          </svg>
        </div>
        <h3>Войдите в систему</h3>
        <p>Войдите через Google, чтобы создавать заявки и общаться с другими пользователями</p>
        <button class="g-login-btn" id="loginWall">
          <svg width="15" height="15" viewBox="0 0 48 48">
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.29-8.16 2.29-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          </svg>
          Войти через Google
        </button>
      </div>
      <div id="reqForm" class="form-panel" style="display:none">
        <div><label class="f-lbl">Имя</label><input class="f-inp" id="fName" readonly></div>
        <div><label class="f-lbl">Email</label><input class="f-inp" id="fEmail" readonly></div>
        <div>
          <label class="f-lbl">Сообщение</label>
          <textarea class="f-inp" id="fText" rows="4" placeholder="Опишите вашу заявку…"></textarea>
        </div>
        <div>
          <label class="f-lbl">Фото (до 2 МБ)</label>
          <div class="photo-box" id="photoBox">
            <input type="file" id="photoFile" accept="image/*">
            <button class="rm-ph" id="rmPh">✕</button>
            <div class="ph-placeholder">
              <svg class="ph-icon" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity=".4">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                <circle cx="8.5" cy="8.5" r="1.5"/>
                <polyline points="21 15 16 10 5 21"/>
              </svg>
              <div class="ph-lbl">Нажмите или перетащите фото</div>
            </div>
            <img class="ph-prev" id="phPrev" src="" alt="">
          </div>
        </div>
        <button class="submit-btn" id="submitBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="display:inline;vertical-align:middle;margin-right:6px">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
          Отправить заявку
        </button>
      </div>
    </div>

    <!-- CHAT PANEL -->
    <div id="panel-chat" class="chat-panel" style="display:none">
      <div class="chat-list-wrap" id="chatListWrap">
        <div id="chatListEl"></div>
        <div id="noChats" class="no-conv">
          <div class="no-conv-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
            </svg>
          </div>
          <span>Нет других пользователей</span>
        </div>
      </div>
      <div class="chat-win" id="chatWin">
        <div class="cw-head">
          <button class="cw-back" onclick="closeChat()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <polyline points="15 18 9 12 15 6"/>
            </svg>
          </button>
          <div class="cw-av" id="cwAv"></div>
          <div>
            <div class="cw-name" id="cwName">—</div>
            <div class="cw-sub" id="cwSub">—</div>
          </div>
          <div class="online-dot"></div>
        </div>
        <div class="cw-msgs" id="cwMsgs"></div>
        <div class="cw-input">
          <textarea class="chat-ta" id="chatInp" placeholder="Написать…" rows="1"></textarea>
          <button class="send-btn" onclick="sendMsg()">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
              <line x1="22" y1="2" x2="11" y2="13"/>
              <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </aside>

</div>

<script type="module">
  import './js/firebase.js';
  import './js/requests.js';
  import './js/chat.js';
  import './js/auth.js';
  import './js/ui.js';
</script>

</body>
</html>
