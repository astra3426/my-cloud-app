<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DISPATCH — Система заявок</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;400;600;700;900&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #06060b;
    --bg2: #0d0d16;
    --bg3: #13131f;
    --panel: #1a1a2a;
    --border: #2a2a42;
    --amber: #f5a623;
    --amber-dim: #c07d10;
    --amber-glow: rgba(245,166,35,0.15);
    --cyan: #00d4ff;
    --cyan-dim: rgba(0,212,255,0.1);
    --red: #ff3b3b;
    --green: #00ff9d;
    --text: #e8e8f0;
    --text-dim: #6b6b8a;
    --text-mid: #a0a0c0;
    --mono: 'Share Tech Mono', monospace;
    --sans: 'Barlow', sans-serif;
    --cond: 'Barlow Condensed', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  /* ========== LOGIN ========== */
  #login-screen {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    z-index: 100;
  }

  .login-box {
    text-align: center;
    position: relative;
  }

  .login-grid {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 60px 60px;
    opacity: 0.3;
  }

  .login-grid::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 60% 60% at 50% 50%, transparent 0%, var(--bg) 100%);
  }

  .login-logo {
    font-family: var(--cond);
    font-size: 96px;
    font-weight: 900;
    letter-spacing: -2px;
    color: var(--amber);
    text-shadow: 0 0 60px rgba(245,166,35,0.5), 0 0 120px rgba(245,166,35,0.2);
    line-height: 0.9;
    position: relative;
  }

  .login-logo span {
    display: block;
    font-size: 14px;
    letter-spacing: 8px;
    color: var(--text-dim);
    font-family: var(--mono);
    font-weight: 400;
    text-shadow: none;
    margin-top: 12px;
  }

  .login-divider {
    width: 200px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--amber), transparent);
    margin: 32px auto;
  }

  .login-status {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 2px;
    margin-bottom: 32px;
  }

  .login-status .blink {
    animation: blink 1s step-end infinite;
    color: var(--green);
  }

  @keyframes blink { 50% { opacity: 0; } }

  .btn-login {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    background: transparent;
    border: 1px solid var(--amber);
    color: var(--amber);
    font-family: var(--mono);
    font-size: 13px;
    letter-spacing: 3px;
    padding: 16px 40px;
    cursor: pointer;
    position: relative;
    transition: all 0.2s;
    clip-path: polygon(12px 0%, 100% 0%, calc(100% - 12px) 100%, 0% 100%);
  }

  .btn-login::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--amber-glow);
    opacity: 0;
    transition: opacity 0.2s;
    clip-path: polygon(12px 0%, 100% 0%, calc(100% - 12px) 100%, 0% 100%);
  }

  .btn-login:hover::before { opacity: 1; }
  .btn-login:hover { box-shadow: 0 0 30px rgba(245,166,35,0.3); }

  /* ========== MAIN LAYOUT ========== */
  #app { display: none; min-height: 100vh; }

  /* Header */
  .hdr {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 56px;
    background: rgba(6,6,11,0.95);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 20px;
    z-index: 50;
    backdrop-filter: blur(8px);
  }

  .hdr-logo {
    font-family: var(--cond);
    font-size: 22px;
    font-weight: 900;
    color: var(--amber);
    letter-spacing: 2px;
    flex-shrink: 0;
  }

  .hdr-logo span { color: var(--text-dim); font-size: 11px; font-family: var(--mono); margin-left: 6px; letter-spacing: 1px; }

  .hdr-divider { width: 1px; height: 24px; background: var(--border); }

  .hdr-nav { display: flex; gap: 4px; }

  .nav-btn {
    background: transparent;
    border: none;
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 2px;
    padding: 6px 14px;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
  }

  .nav-btn::after {
    content: '';
    position: absolute;
    bottom: 0; left: 14px; right: 14px;
    height: 1px;
    background: var(--amber);
    transform: scaleX(0);
    transition: transform 0.15s;
  }

  .nav-btn.active, .nav-btn:hover { color: var(--amber); }
  .nav-btn.active::after { transform: scaleX(1); }

  .hdr-search {
    flex: 1;
    max-width: 340px;
    margin-left: auto;
    position: relative;
  }

  .hdr-search input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 8px 12px 8px 36px;
    outline: none;
    transition: border-color 0.2s;
    letter-spacing: 1px;
  }

  .hdr-search input:focus { border-color: var(--amber); }
  .hdr-search input::placeholder { color: var(--text-dim); }

  .hdr-search-icon {
    position: absolute;
    left: 10px; top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
    font-size: 14px;
  }

  .hdr-user {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-left: 8px;
  }

  .hdr-avatar {
    width: 32px; height: 32px;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
    background: var(--amber-dim);
    overflow: hidden;
    flex-shrink: 0;
  }

  .hdr-avatar img { width: 100%; height: 100%; object-fit: cover; }

  .hdr-name {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-mid);
    max-width: 120px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .btn-sm {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 1px;
    padding: 5px 10px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-sm:hover { border-color: var(--red); color: var(--red); }

  /* Sidebar + main */
  .layout {
    display: flex;
    padding-top: 56px;
    height: 100vh;
  }

  .sidebar {
    width: 220px;
    flex-shrink: 0;
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }

  .sidebar-section {
    padding: 16px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-label {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--text-dim);
    margin-bottom: 10px;
  }

  .filter-btn {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    background: transparent;
    border: none;
    color: var(--text-mid);
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 400;
    padding: 8px 10px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: left;
    position: relative;
  }

  .filter-btn::before {
    content: '';
    position: absolute;
    left: 0; top: 4px; bottom: 4px;
    width: 2px;
    background: var(--amber);
    transform: scaleY(0);
    transition: transform 0.15s;
  }

  .filter-btn.active::before { transform: scaleY(1); }
  .filter-btn.active, .filter-btn:hover { color: var(--text); background: var(--bg3); }

  .filter-badge {
    font-family: var(--mono);
    font-size: 10px;
    padding: 2px 6px;
    background: var(--bg3);
    border: 1px solid var(--border);
  }

  .filter-btn.active .filter-badge { border-color: var(--amber); color: var(--amber); }

  .sidebar-stats {
    padding: 16px;
    flex: 1;
  }

  .stat-item {
    margin-bottom: 14px;
  }

  .stat-label { font-family: var(--mono); font-size: 9px; letter-spacing: 2px; color: var(--text-dim); margin-bottom: 4px; }
  .stat-value { font-family: var(--cond); font-size: 28px; font-weight: 700; color: var(--amber); line-height: 1; }

  .online-dot {
    display: inline-block;
    width: 6px; height: 6px;
    background: var(--green);
    border-radius: 50%;
    margin-right: 6px;
    box-shadow: 0 0 6px var(--green);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* Main content */
  .main { flex: 1; overflow-y: auto; background: var(--bg); position: relative; }

  .main-inner { padding: 24px; max-width: 900px; }

  /* Section header */
  .sec-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .sec-title {
    font-family: var(--cond);
    font-size: 28px;
    font-weight: 900;
    letter-spacing: 1px;
  }

  .sec-title span { color: var(--amber); }

  /* Create button */
  .btn-create {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--amber);
    border: none;
    color: #000;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 2px;
    padding: 10px 20px;
    cursor: pointer;
    font-weight: 700;
    transition: all 0.15s;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
  }

  .btn-create:hover { background: #fff; box-shadow: 0 0 20px rgba(245,166,35,0.4); }

  /* Ticket card */
  .ticket {
    background: var(--panel);
    border: 1px solid var(--border);
    margin-bottom: 12px;
    position: relative;
    transition: border-color 0.2s, transform 0.2s;
    animation: slideIn 0.3s ease-out;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .ticket:hover { border-color: var(--amber-dim); }

  .ticket-accent {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--text-dim);
  }

  .ticket.status-new .ticket-accent { background: var(--cyan); }
  .ticket.status-active .ticket-accent { background: var(--amber); box-shadow: 0 0 8px var(--amber); }
  .ticket.status-done .ticket-accent { background: var(--green); }

  .ticket-head {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 14px 16px 10px 20px;
  }

  .ticket-id {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 1px;
    white-space: nowrap;
    margin-top: 3px;
  }

  .ticket-body { flex: 1; }

  .ticket-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
    line-height: 1.3;
  }

  .ticket-meta {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .ticket-author {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
  }

  .ticket-time {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
  }

  .status-tag {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 2px;
    padding: 2px 8px;
    border: 1px solid;
  }

  .status-tag.new { border-color: var(--cyan); color: var(--cyan); }
  .status-tag.active { border-color: var(--amber); color: var(--amber); }
  .status-tag.done { border-color: var(--green); color: var(--green); }

  .ticket-actions {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  .icon-btn {
    background: transparent;
    border: 1px solid transparent;
    color: var(--text-dim);
    cursor: pointer;
    padding: 5px 8px;
    font-size: 13px;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 4px;
    font-family: var(--mono);
    font-size: 11px;
  }

  .icon-btn:hover { color: var(--amber); border-color: var(--amber-dim); }
  .icon-btn.liked { color: var(--amber); }

  .ticket-img {
    margin: 0 16px 12px 20px;
    max-height: 200px;
    overflow: hidden;
    border: 1px solid var(--border);
  }

  .ticket-img img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    display: block;
  }

  /* Admin controls */
  .admin-controls {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px 10px 20px;
    border-top: 1px solid var(--border);
    background: rgba(255,59,59,0.03);
  }

  .admin-label { font-family: var(--mono); font-size: 9px; color: var(--red); letter-spacing: 2px; margin-right: 8px; }

  .admin-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 1px;
    padding: 4px 10px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .admin-btn:hover { border-color: var(--red); color: var(--red); }
  .admin-btn.status-new:hover { border-color: var(--cyan); color: var(--cyan); }
  .admin-btn.status-active:hover { border-color: var(--amber); color: var(--amber); }
  .admin-btn.status-done:hover { border-color: var(--green); color: var(--green); }

  /* ========== MODAL ========== */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(6,6,11,0.85);
    z-index: 200;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--bg2);
    border: 1px solid var(--border);
    width: 520px;
    max-width: 95vw;
    position: relative;
    animation: modalIn 0.2s ease-out;
  }

  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.96) translateY(-16px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal-head {
    padding: 18px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .modal-title {
    font-family: var(--cond);
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 1px;
  }

  .modal-close {
    background: transparent;
    border: none;
    color: var(--text-dim);
    font-size: 20px;
    cursor: pointer;
    padding: 4px;
    transition: color 0.15s;
  }

  .modal-close:hover { color: var(--red); }

  .modal-body { padding: 20px; }

  .field { margin-bottom: 16px; }

  .field label {
    display: block;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--text-dim);
    margin-bottom: 6px;
  }

  .field input,
  .field textarea {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    padding: 10px 12px;
    outline: none;
    transition: border-color 0.2s;
    resize: vertical;
  }

  .field input:focus,
  .field textarea:focus { border-color: var(--amber); }

  .file-drop {
    border: 1px dashed var(--border);
    padding: 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s;
    position: relative;
  }

  .file-drop:hover { border-color: var(--amber-dim); }

  .file-drop input {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  .file-drop-text {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 1px;
  }

  #photo-preview {
    margin-top: 10px;
    max-height: 120px;
    overflow: hidden;
    border: 1px solid var(--border);
    display: none;
  }

  #photo-preview img { width: 100%; max-height: 120px; object-fit: cover; }

  .modal-foot {
    padding: 16px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: flex-end;
    gap: 10px;
  }

  .btn-cancel {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 2px;
    padding: 10px 20px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-cancel:hover { border-color: var(--text-dim); color: var(--text); }

  /* ========== CHAT ========== */
  .chat-layout {
    display: flex;
    height: calc(100vh - 56px);
  }

  .chat-list {
    width: 260px;
    border-right: 1px solid var(--border);
    overflow-y: auto;
    background: var(--bg2);
    flex-shrink: 0;
  }

  .chat-list-head {
    padding: 16px;
    border-bottom: 1px solid var(--border);
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--text-dim);
  }

  .chat-user-item {
    padding: 12px 16px;
    border-bottom: 1px solid rgba(42,42,66,0.5);
    cursor: pointer;
    transition: background 0.15s;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .chat-user-item:hover { background: var(--bg3); }
  .chat-user-item.active { background: var(--bg3); border-left: 2px solid var(--amber); }

  .chat-avatar {
    width: 36px; height: 36px;
    clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%);
    background: var(--panel);
    overflow: hidden;
    flex-shrink: 0;
  }

  .chat-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .chat-avatar-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: var(--amber); font-family: var(--cond); font-size: 16px; font-weight: 700; }

  .chat-user-name { font-size: 13px; font-weight: 600; }
  .chat-user-last { font-family: var(--mono); font-size: 10px; color: var(--text-dim); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 160px; }

  .chat-main {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: var(--bg);
  }

  .chat-header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .chat-header-name { font-family: var(--cond); font-size: 18px; font-weight: 700; }

  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .chat-empty {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 2px;
  }

  .msg {
    max-width: 72%;
    display: flex;
    flex-direction: column;
    gap: 4px;
    animation: slideIn 0.2s ease-out;
  }

  .msg.mine { align-self: flex-end; align-items: flex-end; }
  .msg.theirs { align-self: flex-start; }

  .msg-bubble {
    padding: 10px 14px;
    font-size: 14px;
    line-height: 1.5;
    position: relative;
  }

  .msg.mine .msg-bubble {
    background: var(--amber);
    color: #000;
    clip-path: polygon(0% 0%, calc(100% - 12px) 0%, 100% 50%, calc(100% - 12px) 100%, 0% 100%);
  }

  .msg.theirs .msg-bubble {
    background: var(--panel);
    border: 1px solid var(--border);
    clip-path: polygon(12px 0%, 100% 0%, 100% 100%, 12px 100%, 0% 50%);
  }

  .msg-time {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 1px;
  }

  .chat-input-area {
    padding: 14px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    background: var(--bg2);
  }

  .chat-input {
    flex: 1;
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .chat-input:focus { border-color: var(--amber); }

  .btn-send {
    background: var(--amber);
    border: none;
    color: #000;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 2px;
    padding: 10px 20px;
    cursor: pointer;
    font-weight: 700;
    transition: all 0.15s;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
  }

  .btn-send:hover { background: #fff; }

  /* ========== SCROLLBARS ========== */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); }
  ::-webkit-scrollbar-thumb:hover { background: var(--amber-dim); }

  /* ========== TOAST ========== */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--panel);
    border: 1px solid var(--amber);
    color: var(--amber);
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 1px;
    padding: 12px 20px;
    z-index: 999;
    animation: toastIn 0.2s ease-out;
  }

  @keyframes toastIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ========== VIEWS ========== */
  .view { display: none; }
  .view.active { display: block; }
  #chat-view.active { display: flex; }

  /* No tickets placeholder */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
  }

  .empty-state-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.4; }
  .empty-state-text { font-family: var(--mono); font-size: 12px; letter-spacing: 2px; }

  /* Admin panel badge */
  .admin-badge {
    background: rgba(255,59,59,0.15);
    border: 1px solid var(--red);
    color: var(--red);
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 2px;
    padding: 2px 8px;
  }

  .select-status {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 10px;
    padding: 4px 8px;
    outline: none;
    cursor: pointer;
  }

  .select-status:focus { border-color: var(--amber); }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-grid"></div>
  <div class="login-box">
    <div class="login-logo">
      DISPATCH
      <span>// СИСТЕМА ЗАЯВОК v2.0</span>
    </div>
    <div class="login-divider"></div>
    <div class="login-status">
      <span class="blink">█</span> ОЖИДАНИЕ АВТОРИЗАЦИИ
    </div>
    <button class="btn-login" onclick="signIn()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      ВОЙТИ ЧЕРЕЗ GOOGLE
    </button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <!-- Header -->
  <header class="hdr">
    <div class="hdr-logo">DISPATCH <span>// v2.0</span></div>
    <div class="hdr-divider"></div>
    <nav class="hdr-nav">
      <button class="nav-btn active" onclick="showView('feed-view', this)">ЛЕНТА</button>
      <button class="nav-btn" onclick="showView('chat-view', this)">ЧАТ</button>
    </nav>
    <div class="hdr-search">
      <span class="hdr-search-icon">⌕</span>
      <input type="text" id="search-input" placeholder="ПОИСК ЗАЯВОК..." oninput="filterTickets()">
    </div>
    <div class="hdr-user">
      <div class="hdr-avatar">
        <img id="hdr-photo" src="" alt="">
      </div>
      <span class="hdr-name" id="hdr-name">—</span>
      <button class="btn-sm" onclick="signOut()">ВЫЙТИ</button>
    </div>
  </header>

  <!-- FEED VIEW -->
  <div id="feed-view" class="view active">
    <div class="layout">
      <aside class="sidebar">
        <div class="sidebar-section">
          <div class="sidebar-label">// ФИЛЬТР СТАТУСА</div>
          <button class="filter-btn active" onclick="setFilter('all', this)">
            ВСЕ
            <span class="filter-badge" id="cnt-all">0</span>
          </button>
          <button class="filter-btn" onclick="setFilter('new', this)">
            НОВЫЕ
            <span class="filter-badge" id="cnt-new">0</span>
          </button>
          <button class="filter-btn" onclick="setFilter('active', this)">
            В РАБОТЕ
            <span class="filter-badge" id="cnt-active">0</span>
          </button>
          <button class="filter-btn" onclick="setFilter('done', this)">
            ВЫПОЛНЕНО
            <span class="filter-badge" id="cnt-done">0</span>
          </button>
        </div>
        <div class="sidebar-stats">
          <div class="sidebar-label">// СТАТИСТИКА</div>
          <div class="stat-item">
            <div class="stat-label">ВСЕГО ЗАЯВОК</div>
            <div class="stat-value" id="stat-total">0</div>
          </div>
          <div class="stat-item">
            <div class="stat-label">СТАТУС СИСТЕМЫ</div>
            <div class="stat-label"><span class="online-dot"></span>ONLINE</div>
          </div>
          <div id="admin-stat" style="display:none">
            <div class="stat-label" style="margin-top:16px">// ДОСТУП</div>
            <span class="admin-badge">ADMIN</span>
          </div>
        </div>
      </aside>

      <main class="main">
        <div class="main-inner">
          <div class="sec-header">
            <div class="sec-title">ЛЕНТА <span>ЗАЯВОК</span></div>
            <button class="btn-create" onclick="openModal()">+ НОВАЯ ЗАЯВКА</button>
          </div>
          <div id="tickets-container">
            <div class="empty-state">
              <div class="empty-state-icon">⊡</div>
              <div class="empty-state-text">ЗАЯВКИ ОТСУТСТВУЮТ</div>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- CHAT VIEW -->
  <div id="chat-view" class="view">
    <div class="chat-layout" style="width:100%">
      <div class="chat-list">
        <div class="chat-list-head">// ПОЛЬЗОВАТЕЛИ</div>
        <div id="chat-users-list"></div>
      </div>
      <div class="chat-main">
        <div class="chat-header" id="chat-header" style="display:none">
          <div class="chat-header-name" id="chat-partner-name">—</div>
        </div>
        <div class="chat-empty" id="chat-empty">
          <span>// ВЫБЕРИТЕ ПОЛЬЗОВАТЕЛЯ</span>
        </div>
        <div id="chat-messages" class="chat-messages" style="display:none"></div>
        <div class="chat-input-area" id="chat-input-area" style="display:none">
          <input class="chat-input" id="chat-msg-input" placeholder="СООБЩЕНИЕ..." onkeydown="if(event.key==='Enter')sendMsg()">
          <button class="btn-send" onclick="sendMsg()">ОТПРАВИТЬ</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- CREATE MODAL -->
<div class="modal-overlay" id="create-modal">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title">НОВАЯ ЗАЯВКА</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label>// ЗАГОЛОВОК</label>
        <input type="text" id="ticket-title" placeholder="Опишите проблему кратко">
      </div>
      <div class="field">
        <label>// ОПИСАНИЕ</label>
        <textarea id="ticket-desc" rows="4" placeholder="Подробное описание..."></textarea>
      </div>
      <div class="field">
        <label>// ФОТО (ОПЦИОНАЛЬНО)</label>
        <div class="file-drop">
          <input type="file" id="ticket-photo" accept="image/*" onchange="previewPhoto(this)">
          <div class="file-drop-text">ПЕРЕТАЩИТЕ ФАЙЛ ИЛИ НАЖМИТЕ</div>
        </div>
        <div id="photo-preview"><img id="photo-preview-img" src=""></div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn-cancel" onclick="closeModal()">ОТМЕНА</button>
      <button class="btn-create" onclick="createTicket()">СОЗДАТЬ ЗАЯВКУ</button>
    </div>
  </div>
</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut as fbSignOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc, query, orderBy, serverTimestamp, getDocs, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

const ADMIN_EMAIL = "markshelkonogov003@gmail.com";

const app = initializeApp({
  apiKey: "AIzaSyCVz4TxqdDSSCn7Ztdt_c0rH9fuG3rYRIQ",
  authDomain: "project-1377923308705650525.firebaseapp.com",
  projectId: "project-1377923308705650525",
  storageBucket: "project-1377923308705650525.firebasestorage.app",
  messagingSenderId: "816182554603",
  appId: "1:816182554603:web:624159d3c9c89a046c73ae"
});

const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);
const provider = new GoogleAuthProvider();

let currentUser = null;
let allTickets = [];
let currentFilter = 'all';
let currentChatPartner = null;
let chatUnsub = null;

// Expose globals
window.signIn = async () => {
  try { await signInWithPopup(auth, provider); } catch(e) { showToast('ОШИБКА ВХОДА'); }
};

window.signOut = async () => {
  await fbSignOut(auth);
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
};

window.showView = (id, btn) => {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (id === 'chat-view') loadChatUsers();
};

window.setFilter = (f, btn) => {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTickets();
};

window.filterTickets = renderTickets;
window.openModal = () => document.getElementById('create-modal').classList.add('open');
window.closeModal = () => {
  document.getElementById('create-modal').classList.remove('open');
  document.getElementById('ticket-title').value = '';
  document.getElementById('ticket-desc').value = '';
  document.getElementById('ticket-photo').value = '';
  document.getElementById('photo-preview').style.display = 'none';
};

window.previewPhoto = (input) => {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById('photo-preview-img').src = e.target.result;
    document.getElementById('photo-preview').style.display = 'block';
  };
  reader.readAsDataURL(file);
};

window.createTicket = async () => {
  const title = document.getElementById('ticket-title').value.trim();
  const desc = document.getElementById('ticket-desc').value.trim();
  if (!title) { showToast('ВВЕДИТЕ ЗАГОЛОВОК'); return; }

  const btn = document.querySelector('.modal-foot .btn-create');
  btn.textContent = 'ЗАГРУЗКА...';
  btn.disabled = true;

  let photoURL = null;
  const file = document.getElementById('ticket-photo').files[0];
  if (file) {
    try {
      const storageRef = ref(storage, `tickets/${Date.now()}_${file.name}`);
      await uploadBytes(storageRef, file);
      photoURL = await getDownloadURL(storageRef);
    } catch(e) {
      console.warn('Storage error:', e.code, e.message);
      showToast('ФОТО НЕ ЗАГРУЖЕНО — ЗАЯВКА БЕЗ ФОТО');
    }
  }

  try {
    await addDoc(collection(db, 'tickets'), {
      title, desc,
      photoURL: photoURL || null,
      status: 'new',
      authorId: currentUser.uid,
      authorName: currentUser.displayName || currentUser.email,
      authorPhoto: currentUser.photoURL || null,
      likes: [],
      createdAt: serverTimestamp()
    });
    closeModal();
    showToast('ЗАЯВКА СОЗДАНА');
  } catch(e) {
    console.error('Firestore error:', e.code, e.message);
    showToast('ОШИБКА: ' + (e.code || e.message));
  } finally {
    btn.textContent = 'СОЗДАТЬ ЗАЯВКУ';
    btn.disabled = false;
  }
};

window.toggleLike = async (id, likes) => {
  const uid = currentUser.uid;
  const newLikes = likes.includes(uid) ? likes.filter(l => l !== uid) : [...likes, uid];
  await updateDoc(doc(db, 'tickets', id), { likes: newLikes });
};

window.deleteTicket = async (id) => {
  if (!confirm('Удалить заявку?')) return;
  await deleteDoc(doc(db, 'tickets', id));
  showToast('ЗАЯВКА УДАЛЕНА');
};

window.changeStatus = async (id, status) => {
  await updateDoc(doc(db, 'tickets', id), { status });
  showToast('СТАТУС ОБНОВЛЕН');
};

// Chat
window.openChat = async (uid, name, photo) => {
  currentChatPartner = { uid, name, photo };
  document.getElementById('chat-empty').style.display = 'none';
  document.getElementById('chat-header').style.display = 'flex';
  document.getElementById('chat-messages').style.display = 'flex';
  document.getElementById('chat-input-area').style.display = 'flex';
  document.getElementById('chat-partner-name').textContent = name;

  document.querySelectorAll('.chat-user-item').forEach(el => el.classList.remove('active'));
  document.querySelector(`[data-uid="${uid}"]`)?.classList.add('active');

  if (chatUnsub) chatUnsub();
  const chatId = [currentUser.uid, uid].sort().join('_');
  const msgsRef = collection(db, 'chats', chatId, 'messages');
  const q = query(msgsRef, orderBy('createdAt'));

  chatUnsub = onSnapshot(q, snap => {
    const container = document.getElementById('chat-messages');
    container.innerHTML = '';
    snap.docs.forEach(d => {
      const msg = d.data();
      const isMine = msg.senderId === currentUser.uid;
      const time = msg.createdAt?.toDate?.()?.toLocaleTimeString('ru', {hour:'2-digit',minute:'2-digit'}) || '';
      const div = document.createElement('div');
      div.className = `msg ${isMine ? 'mine' : 'theirs'}`;
      div.innerHTML = `<div class="msg-bubble">${escapeHtml(msg.text)}</div><div class="msg-time">${time}</div>`;
      container.appendChild(div);
    });
    container.scrollTop = container.scrollHeight;
  });
};

window.sendMsg = async () => {
  const input = document.getElementById('chat-msg-input');
  const text = input.value.trim();
  if (!text || !currentChatPartner) return;

  const chatId = [currentUser.uid, currentChatPartner.uid].sort().join('_');
  await addDoc(collection(db, 'chats', chatId, 'messages'), {
    text,
    senderId: currentUser.uid,
    senderName: currentUser.displayName,
    createdAt: serverTimestamp()
  });
  input.value = '';
};

async function loadChatUsers() {
  const snap = await getDocs(collection(db, 'users'));
  const list = document.getElementById('chat-users-list');
  list.innerHTML = '';
  snap.docs.forEach(d => {
    const u = d.data();
    if (u.uid === currentUser.uid) return;
    const initial = (u.displayName || '?')[0].toUpperCase();
    const div = document.createElement('div');
    div.className = 'chat-user-item';
    div.dataset.uid = u.uid;
    div.innerHTML = `
      <div class="chat-avatar">
        ${u.photoURL ? `<img src="${u.photoURL}">` : `<div class="chat-avatar-placeholder">${initial}</div>`}
      </div>
      <div>
        <div class="chat-user-name">${escapeHtml(u.displayName || 'Пользователь')}</div>
        <div class="chat-user-last">${escapeHtml(u.email || '')}</div>
      </div>`;
    div.onclick = () => openChat(u.uid, u.displayName, u.photoURL);
    list.appendChild(div);
  });
  if (!list.children.length) list.innerHTML = '<div style="padding:16px;font-family:var(--mono);font-size:11px;color:var(--text-dim)">// НЕТ ПОЛЬЗОВАТЕЛЕЙ</div>';
}

function renderTickets() {
  const container = document.getElementById('tickets-container');
  const search = document.getElementById('search-input').value.toLowerCase();
  const isAdmin = currentUser?.email === ADMIN_EMAIL;

  let filtered = allTickets.filter(t => {
    if (currentFilter !== 'all' && t.status !== currentFilter) return false;
    if (search && !t.title?.toLowerCase().includes(search) && !t.desc?.toLowerCase().includes(search)) return false;
    return true;
  });

  // Update badges
  document.getElementById('cnt-all').textContent = allTickets.length;
  document.getElementById('cnt-new').textContent = allTickets.filter(t=>t.status==='new').length;
  document.getElementById('cnt-active').textContent = allTickets.filter(t=>t.status==='active').length;
  document.getElementById('cnt-done').textContent = allTickets.filter(t=>t.status==='done').length;
  document.getElementById('stat-total').textContent = allTickets.length;

  if (!filtered.length) {
    container.innerHTML = `<div class="empty-state"><div class="empty-state-icon">⊡</div><div class="empty-state-text">ЗАЯВКИ ОТСУТСТВУЮТ</div></div>`;
    return;
  }

  container.innerHTML = filtered.map(t => {
    const liked = t.likes?.includes(currentUser?.uid);
    const statusLabel = {new:'НОВАЯ', active:'В РАБОТЕ', done:'ВЫПОЛНЕНО'}[t.status] || t.status;
    const time = t.createdAt?.toDate?.()?.toLocaleDateString('ru', {day:'2-digit',month:'2-digit',year:'numeric'}) || '';
    const shortId = t.id.slice(-6).toUpperCase();

    return `<div class="ticket status-${t.status}">
      <div class="ticket-accent"></div>
      <div class="ticket-head">
        <div class="ticket-id">#${shortId}</div>
        <div class="ticket-body">
          <div class="ticket-title">${escapeHtml(t.title)}</div>
          <div class="ticket-meta">
            <span class="ticket-author">${escapeHtml(t.authorName || '')}</span>
            <span class="ticket-time">${time}</span>
            <span class="status-tag ${t.status}">${statusLabel}</span>
          </div>
          ${t.desc ? `<div style="margin-top:8px;font-size:13px;color:var(--text-mid);line-height:1.5">${escapeHtml(t.desc)}</div>` : ''}
        </div>
        <div class="ticket-actions">
          <button class="icon-btn ${liked ? 'liked' : ''}" onclick="toggleLike('${t.id}', ${JSON.stringify(t.likes || [])})">
            ♥ ${t.likes?.length || 0}
          </button>
        </div>
      </div>
      ${t.photoURL ? `<div class="ticket-img"><img src="${t.photoURL}" loading="lazy"></div>` : ''}
      ${isAdmin ? `<div class="admin-controls">
        <span class="admin-label">ADMIN</span>
        <button class="admin-btn status-new" onclick="changeStatus('${t.id}','new')">НОВАЯ</button>
        <button class="admin-btn status-active" onclick="changeStatus('${t.id}','active')">В РАБОТЕ</button>
        <button class="admin-btn status-done" onclick="changeStatus('${t.id}','done')">ВЫПОЛНЕНО</button>
        <button class="admin-btn" onclick="deleteTicket('${t.id}')" style="margin-left:auto">✕ УДАЛИТЬ</button>
      </div>` : ''}
    </div>`;
  }).join('');
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = '// ' + msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

// Auth state
onAuthStateChanged(auth, async user => {
  currentUser = user;
  if (user) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('hdr-name').textContent = user.displayName || user.email;
    const ph = document.getElementById('hdr-photo');
    ph.src = user.photoURL || '';
    if (user.email === ADMIN_EMAIL) document.getElementById('admin-stat').style.display = 'block';

    // Save user to Firestore
    await setDoc(doc(db, 'users', user.uid), {
      uid: user.uid,
      displayName: user.displayName,
      email: user.email,
      photoURL: user.photoURL
    }, { merge: true });

    // Real-time tickets
    const q = query(collection(db, 'tickets'), orderBy('createdAt', 'desc'));
    onSnapshot(q, snap => {
      allTickets = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      renderTickets();
    });
  } else {
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
  }
});
</script>
</body>
</html>
