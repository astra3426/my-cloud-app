<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Мой облачный проект</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: #0a0a0a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Georgia', serif;
    }
    .card {
      background: #111;
      border: 1px solid #8a6a00;
      padding: 50px 45px;
      width: 420px;
      box-shadow: 0 0 40px rgba(180, 130, 0, 0.15);
    }
    .label-top {
      color: #b8860b;
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 16px;
    }
    .label-top::before {
      content: '— ';
    }
    h1 {
      color: #f0c040;
      font-size: 32px;
      font-weight: bold;
      margin-bottom: 10px;
    }
    .subtitle {
      color: #777;
      font-size: 13px;
      margin-bottom: 36px;
      line-height: 1.6;
    }
    .field-label {
      color: #888;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .field {
      margin-bottom: 24px;
    }
    input {
      width: 100%;
      background: #1a1a1a;
      border: 1px solid #333;
      color: #eee;
      padding: 14px 16px;
      font-size: 14px;
      outline: none;
      transition: border 0.3s;
    }
    input::placeholder { color: #444; }
    input:focus { border-color: #b8860b; }
    button {
      width: 100%;
      padding: 16px;
      background: #b8860b;
      color: #000;
      font-size: 12px;
      font-weight: bold;
      letter-spacing: 3px;
      text-transform: uppercase;
      border: none;
      cursor: pointer;
      margin-top: 10px;
      transition: background 0.3s;
    }
    button:hover { background: #d4a017; }
    .footer-note {
      text-align: center;
      color: #444;
      font-size: 11px;
      margin-top: 20px;
    }
    .footer-note span { color: #b8860b; }
  </style>
</head>
<body>
  <div class="card">
    <div class="label-top">Новая заявка</div>
    <h1>Отправить заявку</h1>
    <p class="subtitle">Заполните форму — данные сохраняются в базе и мы с вами свяжемся.</p>

    <form id="feedbackForm">
      <div class="field">
        <div class="field-label">Ваше имя</div>
        <input type="text" id="userName" placeholder="Иван Иванов" required>
      </div>
      <div class="field">
        <div class="field-label">Email-адрес</div>
        <input type="email" id="userEmail" placeholder="ivan@example.com" required>
      </div>
      <button type="submit">→ Отправить заявку</button>
    </form>

    <div class="footer-note">Данные сохраняются в <span>Firebase Firestore</span></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getFirestore, addDoc, collection } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCVz4TxqdDSSCn7Ztdt_c0rH9fuG3rYRIQ",
      authDomain: "project-1377923308705650525.firebaseapp.com",
      projectId: "project-1377923308705650525",
      storageBucket: "project-1377923308705650525.firebasestorage.app",
      messagingSenderId: "816182554603",
      appId: "1:816182554603:web:624159d3c9c89a046c73ae"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    document.getElementById("feedbackForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const nameInput = document.getElementById("userName").value;
      const emailInput = document.getElementById("userEmail").value;
      try {
        await addDoc(collection(db, "requests"), {
          name: nameInput,
          email: emailInput,
          timestamp: new Date()
        });
        alert("Готово! Данные сохранены в Firebase.");
        document.getElementById("feedbackForm").reset();
      } catch (error) {
        console.error("Ошибка: ", error);
        alert("Ошибка при отправке.");
      }
    });
  </script>
</body>
</html>
