<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Отправить заявку — Быстрый отклик</title>
  
  <style>
    :root {
      --bg:        #0a0a0a;
      --card:      #111111;
      --border:    #2a2a2a;
      --gold:      #d4a017;
      --gold-dark: #b8860b;
      --gold-light:#e6b923;
      --text:      #f0f0f0;
      --text-mute: #aaaaaa;
      --error:     #ff6b6b;
      --success:   #5fd97f;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100dvh;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, sans-serif;
      display: grid;
      place-items: center;
      padding: 1.5rem;
      line-height: 1.5;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--gold-dark);
      border-radius: 16px;
      padding: 3rem 2.5rem;
      width: 100%;
      max-width: 460px;
      box-shadow: 0 12px 48px rgba(212, 160, 23, 0.08);
      transition: transform 0.22s ease, box-shadow 0.22s ease;
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 60px rgba(212, 160, 23, 0.11);
    }

    .eyebrow {
      color: var(--gold);
      font-size: 0.775rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 0.8rem;
    }

    h1 {
      font-size: 2.1rem;
      font-weight: 700;
      color: #f0c040;
      margin-bottom: 0.6rem;
      line-height: 1.1;
    }

    .subtitle {
      color: var(--text-mute);
      font-size: 1rem;
      margin-bottom: 2.4rem;
    }

    .form-group {
      margin-bottom: 1.6rem;
    }

    label {
      display: block;
      color: #ccc;
      font-size: 0.82rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    input {
      width: 100%;
      padding: 1rem 1.2rem;
      background: #1c1c1c;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 1.05rem;
      transition: all 0.2s ease;
    }

    input:focus {
      outline: none;
      border-color: var(--gold);
      box-shadow: 0 0 0 4px rgba(212, 160, 23, 0.14);
    }

    input::placeholder {
      color: #666;
    }

    .field-error {
      color: var(--error);
      font-size: 0.85rem;
      margin-top: 0.45rem;
      min-height: 1.2em;
      display: none;
    }

    button {
      width: 100%;
      padding: 1.15rem;
      background: var(--gold);
      color: #000;
      font-size: 0.96rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.25s ease;
      margin-top: 1rem;
    }

    button:hover:not(:disabled) {
      background: var(--gold-light);
      transform: translateY(-2px);
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .message {
      padding: 1.1rem;
      border-radius: 10px;
      margin-top: 1.6rem;
      font-weight: 500;
      text-align: center;
      display: none;
    }

    .success {
      background: rgba(95, 217, 127, 0.14);
      color: #a8ffbe;
      border: 1px solid rgba(95, 217, 127, 0.35);
    }

    .error-msg {
      background: rgba(255, 107, 107, 0.12);
      color: #ff9999;
      border: 1px solid rgba(255, 107, 107, 0.35);
    }

    .footer {
      text-align: center;
      color: #555;
      font-size: 0.82rem;
      margin-top: 2.2rem;
    }

    .footer span {
      color: var(--gold);
    }

    @media (max-width: 480px) {
      .card { padding: 2.2rem 1.8rem; }
      h1 { font-size: 1.9rem; }
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="eyebrow">Новая заявка</div>
    <h1>Оставьте заявку</h1>
    <p class="subtitle">
      Заполните форму — мы свяжемся с вами в течение 1–2 часов.
    </p>

    <form id="leadForm" novalidate>
      <div class="form-group">
        <label for="name">Имя</label>
        <input
          id="name"
          type="text"
          placeholder="Как к вам обращаться?"
          required
          minlength="2"
          maxlength="80"
          autocomplete="name"
        />
        <div class="field-error" id="nameErr">Введите имя (от 2 символов)</div>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          placeholder="ваш@email.com"
          required
          autocomplete="email"
        />
        <div class="field-error" id="emailErr">Укажите корректный email</div>
      </div>

      <button type="submit" id="submit">Отправить заявку →</button>
    </form>

    <div class="message success" id="successMsg">
      ✓ Заявка принята! Скоро с вами свяжемся.
    </div>
    <div class="message error-msg" id="errorMsg">
      Что-то пошло не так. Попробуйте ещё раз.
    </div>

    <div class="footer">
      Данные защищены и хранятся в <span>Firebase Firestore</span>
    </div>
  </div>

  <script type="module">
    // Firebase v12.10.0 — актуальная на март 2026
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import {
      getFirestore,
      collection,
      addDoc,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCVz4TxqdDSSCn7Ztdt_c0rH9fuG3rYRIQ",
      authDomain: "project-1377923308705650525.firebaseapp.com",
      projectId: "project-1377923308705650525",
      storageBucket: "project-1377923308705650525.firebasestorage.app",
      messagingSenderId: "816182554603",
      appId: "1:816182554603:web:624159d3c9c89a046c73ae"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const form   = document.getElementById("leadForm");
    const submit = document.getElementById("submit");
    const successMsg = document.getElementById("successMsg");
    const errorMsg   = document.getElementById("errorMsg");

    // Скрываем сообщения при вводе
    form.addEventListener("input", () => {
      successMsg.style.display = "none";
      errorMsg.style.display   = "none";
      document.querySelectorAll(".field-error").forEach(el => el.style.display = "none");
    });

    form.addEventListener("submit", async e => {
      e.preventDefault();

      // Сбрасываем ошибки
      document.querySelectorAll(".field-error").forEach(el => el.style.display = "none");
      successMsg.style.display = "none";
      errorMsg.style.display   = "none";

      const name  = form.name.value.trim();
      const email = form.email.value.trim();

      let valid = true;

      if (name.length < 2) {
        document.getElementById("nameErr").style.display = "block";
        valid = false;
      }

      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        document.getElementById("emailErr").style.display = "block";
        valid = false;
      }

      if (!valid) return;

      submit.disabled = true;
      submit.textContent = "Отправляем...";

      try {
        await addDoc(collection(db, "leads"), {  // ← поменял коллекцию на "leads" — более понятное имя
          name,
          email,
          createdAt: serverTimestamp(),
          createdAtClient: new Date().toISOString(), // на всякий случай
          source: "one-page-lead-2026"
        });

        form.reset();
        successMsg.style.display = "block";

        // Автоскрытие через 7 секунд
        setTimeout(() => successMsg.style.display = "none", 7000);

      } catch (err) {
        console.error("Firestore ошибка:", err);
        let msg = "Ошибка сохранения. Попробуйте позже.";
        if (err.code === "permission-denied") {
          msg = "Нет прав на запись в базу. Проверьте правила Firestore.";
        }
        errorMsg.textContent = msg;
        errorMsg.style.display = "block";
      } finally {
        submit.disabled = false;
        submit.textContent = "Отправить заявку →";
      }
    });
  </script>
</body>
</html>
